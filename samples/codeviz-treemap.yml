width: 1920
height: 1080
treemap:
    size: file-size
    fill:
        metric: file-type
        palette: categorization
    border:
        metric: file-freshness
        palette: good-bad
radial:
    labels: all
bubbletree:
    labels: folders
spiral:
    resolution: daily
    labels: laps
fileFilter:
    - pattern: .*
      mode: exclude
