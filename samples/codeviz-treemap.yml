width: 1920
height: 1080
treemap:
    size: file-lines
    fill:
        metric: file-type
        palette: categorization
    border:
        metric: file-freshness
        palette: good-bad
    legend: top-left
    legendOrientation: vertical
radial:
    labels: all
bubbletree:
    labels: folders
spiral:
    resolution: daily
    labels: laps
fileFilter:
    - pattern: superpowers
      mode: exclude
    - pattern: "*.svg"
      mode: exclude
    - pattern: ".*"
      mode: exclude
