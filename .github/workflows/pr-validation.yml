name: Validate Pull Request
on:
  workflow_dispatch:
    # No configuration, but allows manual triggering

  pull_request:
    branches:
      - main

  merge_group:
    branches:
      - main
    types: [checks_requested]

jobs:
  devcontainer:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build devcontainer image and push
        uses: devcontainers/ci@v0.3
        with:
          imageName: ghcr.io/theunrepentantgeek/code-visualizer-devcontainer
          cacheFrom: ghcr.io/theunrepentantgeek/code-visualizer-devcontainer
          push: ${{ (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork) && 'always' || 'never' }}

  test:
    runs-on: ubuntu-latest
    permissions:
      packages: read
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build devcontainer image
        uses: devcontainers/ci@v0.3
        with:
          imageName: ghcr.io/theunrepentantgeek/code-visualizer-devcontainer
          cacheFrom: ghcr.io/theunrepentantgeek/code-visualizer-devcontainer
          push: never

      - name: Run task ci in devcontainer
        uses: devcontainers/ci@v0.3
        with:
          imageName: ghcr.io/theunrepentantgeek/code-visualizer-devcontainer
          push: never
          runCmd: task ci
