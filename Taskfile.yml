version: "3"

tasks:
  build:
    desc: Build the codeviz binary
    cmds:
      - go build -o bin/codeviz ./cmd/codeviz
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - bin/codeviz

  build:release:
    desc: Build cross-platform release binaries into build/
    cmds:
      - mkdir -p build
      - CGO_ENABLED=0 GOOS=linux   GOARCH=amd64 go build -o build/codeviz-linux-amd64   ./cmd/codeviz
      - CGO_ENABLED=0 GOOS=linux   GOARCH=arm64 go build -o build/codeviz-linux-arm64   ./cmd/codeviz
      - CGO_ENABLED=0 GOOS=darwin  GOARCH=amd64 go build -o build/codeviz-darwin-amd64  ./cmd/codeviz
      - CGO_ENABLED=0 GOOS=darwin  GOARCH=arm64 go build -o build/codeviz-darwin-arm64  ./cmd/codeviz
      - CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -o build/codeviz-windows-amd64.exe ./cmd/codeviz
      - CGO_ENABLED=0 GOOS=windows GOARCH=arm64 go build -o build/codeviz-windows-arm64.exe ./cmd/codeviz

  test:
    desc: Run all tests
    cmds:
      - go test ./... -count=1

  test:race:
    desc: Run all tests with the race detector enabled
    cmds:
      - go test ./... -count=1 -race

  test:cover:
    desc: Run tests with coverage report
    cmds:
      - go test ./... -count=1 -coverprofile=coverage.out
      - go tool cover -func=coverage.out

  bench:
    desc: Run benchmarks
    cmds:
      - go test ./... -bench=. -benchmem -run=^$ -count=1

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint-custom version
      - golangci-lint-custom cache clean
      - golangci-lint-custom run --verbose

  fmt:
    desc: Format all Go source files
    cmds:
      - gofumpt -w .

  fmt:check:
    desc: Check formatting without modifying files
    cmds:
      - test -z "$(gofumpt -l .)"

  verify-no-changes:
    desc: Reports uncommitted modifications to files (fails the build only when running in CI)
    cmds:
      - cmd: |
          if [ -z "{{.CHANGED}}" ]; then
            exit 0
          fi
          if [ -n "$CI" ]; then
            echo "Error: files were reformatted during the build (run 'task tidy' then commit):"
          else
            echo "Warning: files were reformatted (run 'task tidy' then commit) - not failing because not in CI:"
          fi
          echo "{{.CHANGED}}"
          git diff
          [ -z "$CI" ] || exit 1
        silent: true
    vars:
      CHANGED:
        sh: git status --porcelain

  mod:check:
    desc: Check that go.mod and go.sum are tidy (no untracked changes)
    cmds:
      - go mod tidy
      - git diff --exit-code go.mod go.sum

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin/ build/ coverage.out

  tidy:
    desc: Format, mod tidy, and lint fix
    cmds:
      - gofumpt -w .
      - go mod tidy
      - go fix ./...
      - golangci-lint-custom version
      - golangci-lint-custom run --fix --verbose

  ci:
    desc: Build, test, and lint
    cmds:
      - task: tidy
      - task: build
      - task: test
      - task: lint
      - task: verify-no-changes

  update-golden-files:
    desc: Regenerate golden file snapshots
    cmds:
      - GOLDIE_UPDATE=1 go test ./... -count=1

  update-superpowers:
    desc: Update superpower snapshots
    cmds:
      # Assumes https://github.com/obra/superpowers.git is cloned at the same level as this repository
      # Cannot be used within the devcontainer
      - 'cp -r {{joinPath .ROOT_DIR ".." "superpowers" "skills"}} .agents/'
      - 'cp -r {{joinPath .ROOT_DIR ".." "superpowers" "agents" "*"}}
        .agents/'

  samples:
    deps:
      - build
    cmds:
      - for:
          matrix:
            IMAGE: [png, svg]
            VIZ: [tree-map, bubble-tree, radial-tree, spiral, scatter]
        cmd: "{{.CODEVIZ}} {{.ITEM.VIZ}} . --config samples/{{.ITEM.VIZ}}/code-visualizer.yml --output samples/{{.ITEM.VIZ}}/code-visualizer.{{.ITEM.IMAGE}} --footer '{{.FOOTER}}' ; echo ''"
    vars:
      CODEVIZ: '{{joinPath .ROOT_DIR "bin" "codeviz"}}'
      # Stable footer (no $time/$date) so regenerated samples are byte-stable.
      FOOTER: 'Generated by github.com/theunrepentantgeek/code-visualizer'

  docs:gallery:
    desc: Generate gallery + hero images for the docs site from fresh samples
    deps:
      - samples
    cmds:
      - mkdir -p docs/content/gallery
      - for:
          matrix:
            VIZ: [tree-map, bubble-tree, radial-tree, spiral, scatter]
        cmd: cp samples/{{.ITEM.VIZ}}/code-visualizer.png docs/content/gallery/{{.ITEM.VIZ}}.png
      - cp samples/tree-map/code-visualizer.png docs/content/hero.png

  docs:serve:
    desc: Serve the documentation site locally with live reload
    deps:
      - docs:gallery
    dir: docs
    cmds:
      - "{{.HUGO}} mod get"
      - "{{.HUGO}} server --buildDrafts"
    vars:
      HUGO: '{{joinPath .ROOT_DIR "tools" "hugo"}}'

  docs:build:
    desc: Build the documentation site into docs/public
    deps:
      - docs:gallery
    dir: docs
    cmds:
      - "{{.HUGO}} mod get"
      - "{{.HUGO}} --minify --gc"
    vars:
      HUGO: '{{joinPath .ROOT_DIR "tools" "hugo"}}'
