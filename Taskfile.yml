version: "3"

tasks:
  build:
    desc: Build the codeviz binary
    cmds:
      - go build -o bin/codeviz ./cmd/codeviz
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - bin/codeviz

  test:
    desc: Run all tests
    cmds:
      - go test ./... -count=1

  test:race:
    desc: Run all tests with the race detector enabled
    cmds:
      - go test ./... -count=1 -race

  test:cover:
    desc: Run tests with coverage report
    cmds:
      - go test ./... -count=1 -coverprofile=coverage.out
      - go tool cover -func=coverage.out

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint-custom version
      - golangci-lint-custom run --verbose

  fmt:
    desc: Format all Go source files
    cmds:
      - gofumpt -w .

  fmt:check:
    desc: Check formatting without modifying files
    cmds:
      - test -z "$(gofumpt -l .)"

  build:release:
    desc: Cross-compile release binaries for all target platforms into build/
    cmds:
      - mkdir -p build
      - GOOS=linux   GOARCH=amd64 go build -o build/codeviz-linux-amd64   ./cmd/codeviz
      - GOOS=linux   GOARCH=arm64 go build -o build/codeviz-linux-arm64   ./cmd/codeviz
      - GOOS=darwin  GOARCH=amd64 go build -o build/codeviz-darwin-amd64  ./cmd/codeviz
      - GOOS=darwin  GOARCH=arm64 go build -o build/codeviz-darwin-arm64  ./cmd/codeviz
      - GOOS=windows GOARCH=amd64 go build -o build/codeviz-windows-amd64.exe ./cmd/codeviz

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin/ build/ coverage.out

  tidy:
    desc: Format, mod tidy, and lint fix
    cmds:
      - gofumpt -w .
      - go mod tidy
      - go fix ./...
      - golangci-lint-custom version
      - golangci-lint-custom run --fix --verbose

  ci:
    desc: Build, test, and lint
    cmds:
      - task: build
      - task: test
      - task: lint

  update-golden-files:
    desc: Regenerate golden file snapshots
    cmds:
      - GOLDIE_UPDATE=1 go test ./... -count=1

  update-superpowers:
    desc: Update superpower snapshots
    cmds:
      # Assumes https://github.com/obra/superpowers.git is cloned at the same level as this repository
      # Cannot be used within the devcontainer
      - "cp -r {{joinPath .ROOT_DIR \"..\" \"superpowers\" \"skills\"}} .agents/"
      - "cp -r {{joinPath .ROOT_DIR \"..\" \"superpowers\" \"agents\" \"*\"}}
        .agents/"

  samples:
    deps:
    - build
    cmds:
    - for:
        matrix: 
          IMAGE_TYPE: [png, svg]
          VIZ_TYPE: [treemap, bubbletree, radial, spiral]
      cmd: "{{.CODEVIZ}} render {{.ITEM.VIZ_TYPE}} . --config samples/codeviz-{{.ITEM.VIZ_TYPE}}.yml --output samples/codeviz-{{.VIZ_TYPE}}.{{.ITEM.IMAGE_TYPE}}"
    vars:
      CODEVIZ: "{{joinPath .ROOT_DIR \"bin\" \"codeviz\"}}"