name: Squad Triage

on:
  issues:
    types: [labeled]

permissions:
  issues: write
  contents: read

jobs:
  triage:
    if: github.event.label.name == 'squad'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Triage issue via Lead agent
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const issue = context.payload.issue;

            // Read team roster — check .squad/ first, fall back to .ai-team/
            let teamFile = '.squad/team.md';
            if (!fs.existsSync(teamFile)) {
              teamFile = '.ai-team/team.md';
            }
            if (!fs.existsSync(teamFile)) {
              core.warning('No .squad/team.md or .ai-team/team.md found — cannot triage');
              return;
            }

            const content = fs.readFileSync(teamFile, 'utf8');
            const lines = content.split('\n');

            // Check if @copilot is on the team
            const hasCopilot = content.includes('🤖 Coding Agent');
            const copilotAutoAssign = content.includes('<!-- copilot-auto-assign: true -->');

            // Parse @copilot capability profile
            let goodFitKeywords = [];
            let needsReviewKeywords = [];
            let notSuitableKeywords = [];

            if (hasCopilot) {
              // Extract capability tiers from team.md
              const goodFitMatch = content.match(/🟢\s*Good fit[^:]*:\s*(.+)/i);
              const needsReviewMatch = content.match(/🟡\s*Needs review[^:]*:\s*(.+)/i);
              const notSuitableMatch = content.match(/🔴\s*Not suitable[^:]*:\s*(.+)/i);

              if (goodFitMatch) {
                goodFitKeywords = goodFitMatch[1].toLowerCase().split(',').map(s => s.trim());
              } else {
                goodFitKeywords = ['bug fix', 'test coverage', 'lint', 'format', 'dependency update', 'small feature', 'scaffolding', 'doc fix', 'documentation'];
              }
              if (needsReviewMatch) {
                needsReviewKeywords = needsReviewMatch[1].toLowerCase().split(',').map(s => s.trim());
              } else {
                needsReviewKeywords = ['medium feature', 'refactoring', 'api endpoint', 'migration'];
              }
              if (notSuitableMatch) {
                notSuitableKeywords = notSuitableMatch[1].toLowerCase().split(',').map(s => s.trim());
              } else {
                notSuitableKeywords = ['architecture', 'system design', 'security', 'auth', 'encryption', 'performance'];
              }
            }

            const members = [];
            let inMembersTable = false;
            for (const line of lines) {
              if (line.match(/^##\s+(Members|Team Roster)/i)) {
                inMembersTable = true;
                continue;
              }
              if (inMembersTable && line.startsWith('## ')) {
                break;
              }
              if (inMembersTable && line.startsWith('|') && !line.includes('---') && !line.includes('Name')) {
                const cells = line.split('|').map(c => c.trim()).filter(Boolean);
                if (cells.length >= 2 && cells[0] !== 'Scribe') {
                  members.push({
                    name: cells[0],
                    role: cells[1]
                  });
                }
              }
            }

            // Read routing rules — check .squad/ first, fall back to .ai-team/
            let routingFile = '.squad/routing.md';
            if (!fs.existsSync(routingFile)) {
              routingFile = '.ai-team/routing.md';
            }
            let routingContent = '';
            if (fs.existsSync(routingFile)) {
              routingContent = fs.readFileSync(routingFile, 'utf8');
            }

            // Find the Lead
            const lead = members.find(m =>
              m.role.toLowerCase().includes('lead') ||
              m.role.toLowerCase().includes('architect') ||
              m.role.toLowerCase().includes('coordinator')
            );

            if (!lead) {
              core.warning('No Lead role found in team roster — cannot triage');
              return;
            }

            // Build triage context
            const memberList = members.map(m =>
              `- **${m.name}** (${m.role}) → label: \`squad:${m.name.toLowerCase()}\``
            ).join('\n');

            // Determine best assignee based on issue content and routing
            //
            // Zone-based scoring: keywords found early in the issue (title,
            // first section) score higher than keywords buried in details or
            // boilerplate. Content below a standalone --- rule is excluded.
            const issueTitle = issue.title || '';
            const issueBody = issue.body || '';

            // Strip content at or below first standalone --- horizontal rule.
            // Table separator rows (|---|---|) are NOT standalone rules.
            let strippedBody = issueBody;
            const hrIndex = strippedBody.search(/^---\s*$/m);
            if (hrIndex !== -1) {
              strippedBody = strippedBody.substring(0, hrIndex);
            }

            // Split into sections by ## headings, fall back to paragraphs.
            let sections;
            if (/^## /m.test(strippedBody)) {
              sections = strippedBody.split(/^## /m);
            } else {
              sections = strippedBody.split(/\n\n+/);
            }

            // Build scored zones: title (4×), section 1 (2×), section 2 (1×).
            // Filter empty sections (e.g. text before first ## heading).
            const nonEmptySections = sections.filter(s => s.trim().length > 0);
            const zones = [
              { text: issueTitle, multiplier: 4 },
            ];
            if (nonEmptySections.length > 0) {
              zones.push({ text: nonEmptySections[0], multiplier: 2 });
            }
            if (nonEmptySections.length > 1) {
              zones.push({ text: nonEmptySections[1], multiplier: 1 });
            }

            // Flat issueText still needed for @copilot evaluation (unchanged).
            const issueText = `${issueTitle}\n${issueBody}`.toLowerCase();

            let assignedMember = null;
            let triageReason = '';
            let copilotTier = null;

            // First, evaluate @copilot fit if enabled
            if (hasCopilot) {
              const isNotSuitable = notSuitableKeywords.some(kw => issueText.includes(kw));
              const isGoodFit = !isNotSuitable && goodFitKeywords.some(kw => issueText.includes(kw));
              const isNeedsReview = !isNotSuitable && !isGoodFit && needsReviewKeywords.some(kw => issueText.includes(kw));

              if (isGoodFit) {
                copilotTier = 'good-fit';
                assignedMember = { name: '@copilot', role: 'Coding Agent' };
                triageReason = '🟢 Good fit for @copilot — matches capability profile';
              } else if (isNeedsReview) {
                copilotTier = 'needs-review';
                assignedMember = { name: '@copilot', role: 'Coding Agent' };
                triageReason = '🟡 Routing to @copilot (needs review) — a squad member should review the PR';
              } else if (isNotSuitable) {
                copilotTier = 'not-suitable';
                // Fall through to normal routing
              }
            }

            // If not routed to @copilot, use routing.md keyword scoring
            if (!assignedMember && routingContent) {
              // Parse "Work Type → Agent" table from routing.md
              const routingRules = [];
              const routingLines = routingContent.split('\n');
              let inRoutingTable = false;
              let pastSeparator = false;

              for (const rline of routingLines) {
                if (rline.match(/^#+.*Work Type/i)) {
                  inRoutingTable = true;
                  pastSeparator = false;
                  continue;
                }
                if (inRoutingTable && /^#+\s/.test(rline) && !rline.match(/Work Type/i)) {
                  break;
                }
                if (inRoutingTable && rline.includes('---')) {
                  pastSeparator = true;
                  continue;
                }
                if (inRoutingTable && pastSeparator && rline.startsWith('|')) {
                  const cells = rline.split('|').map(c => c.trim()).filter(Boolean);
                  if (cells.length >= 2) {
                    const keywords = cells[0].toLowerCase().split(',').map(s => s.trim()).filter(Boolean);
                    const memberName = cells[1].trim();
                    // Skip placeholder/empty rows
                    if (memberName.startsWith('{') || memberName === '—' || memberName === '-') continue;
                    const member = members.find(m => m.name.toLowerCase() === memberName.toLowerCase());
                    if (member) {
                      routingRules.push({ member, keywords });
                    }
                  }
                }
              }

              // Escape regex metacharacters so keywords match literally.
              function escapeRegex(s) {
                return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
              }

              // Keyword weight: multi-word phrases score higher (words²).
              function keywordWeight(kw) {
                const words = kw.split(/\s+/).length;
                return words * words; // 1-word=1, 2-word=4, 3-word=9
              }

              // Test whether a keyword appears as a whole word in text.
              function matchesKeyword(text, kw) {
                const re = new RegExp('\\b' + escapeRegex(kw) + '\\b', 'i');
                return re.test(text);
              }

              // Score each member across all zones. For each keyword, only
              // the highest-scoring zone counts (no double-counting).
              let bestScore = 0;
              let bestMember = null;
              let bestKeywords = [];

              for (const rule of routingRules) {
                let score = 0;
                const matched = [];
                for (const kw of rule.keywords) {
                  let kwBestZoneScore = 0;
                  for (const zone of zones) {
                    if (matchesKeyword(zone.text, kw)) {
                      const zoneScore = keywordWeight(kw) * zone.multiplier;
                      if (zoneScore > kwBestZoneScore) {
                        kwBestZoneScore = zoneScore;
                      }
                    }
                  }
                  if (kwBestZoneScore > 0) {
                    score += kwBestZoneScore;
                    matched.push(kw);
                  }
                }
                if (score > bestScore) {
                  bestScore = score;
                  bestMember = rule.member;
                  bestKeywords = matched;
                }
              }

              if (bestMember) {
                assignedMember = bestMember;
                triageReason = `Matched routing keywords: ${bestKeywords.join(', ')} (score: ${bestScore})`;
              }
            }

            // Default to Lead if no routing match
            if (!assignedMember) {
              assignedMember = lead;
              triageReason = 'No specific domain match — assigned to Lead for further analysis';
            }

            const isCopilot = assignedMember.name === '@copilot';
            const assignLabel = isCopilot ? 'squad:copilot' : `squad:${assignedMember.name.toLowerCase()}`;

            // Add the member-specific label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: [assignLabel]
            });

            // Apply default triage verdict
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: ['go:needs-research']
            });

            // Auto-assign @copilot if enabled
            if (isCopilot && copilotAutoAssign) {
              try {
                await github.rest.issues.addAssignees({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  assignees: ['copilot']
                });
              } catch (err) {
                core.warning(`Could not auto-assign @copilot: ${err.message}`);
              }
            }

            // Build copilot evaluation note
            let copilotNote = '';
            if (hasCopilot && !isCopilot) {
              if (copilotTier === 'not-suitable') {
                copilotNote = `\n\n**@copilot evaluation:** 🔴 Not suitable — issue involves work outside the coding agent's capability profile.`;
              } else {
                copilotNote = `\n\n**@copilot evaluation:** No strong capability match — routed to squad member.`;
              }
            }

            // Post triage comment
            const comment = [
              `### 🏗️ Squad Triage — ${lead.name} (${lead.role})`,
              '',
              `**Issue:** #${issue.number} — ${issue.title}`,
              `**Assigned to:** ${assignedMember.name} (${assignedMember.role})`,
              `**Reason:** ${triageReason}`,
              copilotTier === 'needs-review' ? `\n⚠️ **PR review recommended** — a squad member should review @copilot's work on this one.` : '',
              copilotNote,
              '',
              `---`,
              '',
              `**Team roster:**`,
              memberList,
              hasCopilot ? `- **@copilot** (Coding Agent) → label: \`squad:copilot\`` : '',
              '',
              `> To reassign, remove the current \`squad:*\` label and add the correct one.`,
            ].filter(Boolean).join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: comment
            });

            core.info(`Triaged issue #${issue.number} → ${assignedMember.name} (${assignLabel})`);
